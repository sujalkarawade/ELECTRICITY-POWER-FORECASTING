<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ElectroForecast — SARIMA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <!-- Shared styles -->
  <link rel="stylesheet" href="/static/css/base.css"/>
  <!-- Page-specific styles -->
  {% block page_css %}{% endblock %}
</head>
<body>

<!-- ── Navbar ─────────────────────────────────────────────── -->
<nav class="app-navbar">
  <div class="d-flex align-items-center gap-3">
    <div class="navbar-icon"><i class="bi bi-lightning-charge-fill"></i></div>
    <div>
      <span class="fw-bold fs-5 text-white">ElectroForecast</span>
      <span class="badge-sarima ms-2">SARIMA</span>
    </div>
  </div>
  <div class="d-flex align-items-center gap-3">
    <span class="status-dot" id="statusDot"></span>
    <span class="text-muted small" id="statusText">No data loaded</span>
  </div>
</nav>

<!-- ── Wizard Bar ─────────────────────────────────────────── -->
<div class="wizard-bar">
  <div class="wizard-steps">
    <button class="wizard-step {% if active_page == 'data' %}active{% elif active_page in ['configure','results'] %}done{% endif %}"
            id="step1" onclick="window.location='/'">
      <span class="step-num">{% if active_page in ['configure','results'] %}<i class="bi bi-check-lg"></i>{% else %}1{% endif %}</span>
      <span class="step-label">Data Source</span>
    </button>
    <div class="wizard-connector"></div>
    <button class="wizard-step {% if active_page == 'configure' %}active{% elif active_page == 'results' %}done{% endif %}"
            id="step2" onclick="window.location='/configure'">
      <span class="step-num">{% if active_page == 'results' %}<i class="bi bi-check-lg"></i>{% else %}2{% endif %}</span>
      <span class="step-label">Configure</span>
    </button>
    <div class="wizard-connector"></div>
    <button class="wizard-step {% if active_page == 'results' %}active{% endif %}"
            id="step3" onclick="window.location='/results'">
      <span class="step-num">3</span>
      <span class="step-label">Results</span>
    </button>
  </div>
</div>

<!-- ── Page Content ───────────────────────────────────────── -->
{% block content %}{% endblock %}

<!-- ── Toast ──────────────────────────────────────────────── -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
  <div id="appToast" class="toast align-items-center border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body" id="toastBody"></div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<!-- ── Loading Overlay ────────────────────────────────────── -->
<div id="loadingOverlay" class="loading-overlay d-none">
  <div class="text-center">
    <div class="spinner-border text-accent mb-3" style="width:3rem;height:3rem"></div>
    <p class="text-light fw-semibold" id="loadingText">Processing…</p>
    <p class="text-muted small" id="loadingSubText"></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- Shared JS -->
<script src="/static/js/app.js"></script>
<!-- Page-specific JS -->
{% block page_js %}{% endblock %}

</body>
</html>
